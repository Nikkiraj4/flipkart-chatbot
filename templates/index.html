<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Flipkart AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #f8f9ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #2874f0, #1a5dc8);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 20px rgba(40,116,240,0.3);
        }
        header .logo { font-size: 32px; }
        header h1 { color: white; font-size: 20px; font-weight: 700; }
        header .badge {
            background: rgba(255,255,255,0.18);
            color: #d6e8ff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.25);
            margin-top: 4px;
            display: inline-block;
        }

        /* MAIN */
        main {
            flex: 1;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* WELCOME */
        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #eef2ff;
        }
        .welcome-card h3 { color: #1a1a2e; font-size: 18px; margin-bottom: 8px; }
        .welcome-card p  { color: #666; font-size: 13px; margin-bottom: 16px; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .chip {
            background: #eef4ff; color: #2874f0;
            border: 1.5px solid #c8dcff; border-radius: 20px;
            padding: 6px 14px; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .chip:hover { background: #2874f0; color: white; }

        /* CHAT */
        #chat-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .user-row {
            display: flex; justify-content: flex-end;
            align-items: flex-end; gap: 8px;
        }
        .user-bubble {
            background: linear-gradient(135deg, #2874f0, #1a5dc8);
            color: white; padding: 12px 18px;
            border-radius: 20px 20px 4px 20px;
            max-width: 70%; font-size: 14px; line-height: 1.5;
            box-shadow: 0 2px 12px rgba(40,116,240,0.35);
        }
        .user-avatar {
            width: 34px; height: 34px; background: #2874f0;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        .bot-row {
            display: flex; justify-content: flex-start;
            align-items: flex-start; gap: 8px;
        }
        .bot-avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #ff6d00, #ff9800);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; margin-top: 4px;
        }
        .bot-bubble {
            background: white; color: #1a1a2e;
            padding: 14px 18px;
            border-radius: 20px 20px 20px 4px;
            max-width: 75%; font-size: 14px; line-height: 1.6;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            border: 1px solid #eef2ff;
        }

        /* PRODUCT CARDS */
        .sources-label {
            font-size: 11px; font-weight: 600; color: #888;
            text-transform: uppercase; letter-spacing: 0.8px;
            margin: 10px 0 6px 42px;
        }
        .product-cards {
            display: flex; gap: 10px;
            margin-left: 42px; flex-wrap: wrap;
        }
        .product-card {
            background: white; border: 1.5px solid #e8f0ff;
            border-radius: 14px; padding: 12px 14px;
            min-width: 150px; max-width: 175px;
            box-shadow: 0 2px 10px rgba(40,116,240,0.07);
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-2px); }
        .pc-emoji  { font-size: 22px; margin-bottom: 6px; }
        .pc-name   { font-size: 12px; font-weight: 600; color: #1a1a2e; line-height: 1.3; margin-bottom: 4px; }
        .pc-cat    { font-size: 11px; color: #888; margin-bottom: 6px; }
        .pc-price  {
            font-size: 13px; font-weight: 700; color: #2874f0;
            background: #eef4ff; display: inline-block;
            padding: 2px 8px; border-radius: 8px;
        }

        /* TYPING INDICATOR */
        .typing { display: flex; gap: 4px; padding: 14px 18px; }
        .typing span {
            width: 8px; height: 8px; background: #2874f0;
            border-radius: 50%; animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* INPUT BAR */
        .input-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white;
            border-top: 1px solid #eef2ff;
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .input-inner {
            display: flex; gap: 10px;
            width: 100%; max-width: 780px;
        }
        #user-input {
            flex: 1; border: 2px solid #e8f0ff;
            background: #f5f7ff; border-radius: 12px;
            padding: 12px 16px; font-size: 14px; color: #1a1a2e;
            outline: none; transition: border 0.2s;
        }
        #user-input:focus { border-color: #2874f0; background: #eef4ff; }
        #send-btn {
            background: linear-gradient(135deg, #2874f0, #1a5dc8);
            color: white; border: none; border-radius: 12px;
            padding: 12px 22px; font-size: 14px; font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(40,116,240,0.3);
            transition: all 0.2s;
        }
        #send-btn:hover { box-shadow: 0 6px 20px rgba(40,116,240,0.4); }
        #send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div class="logo">🛒</div>
    <div>
        <h1>Flipkart AI Assistant</h1>
        <span class="badge">🤖 AI-Powered Shopping</span>
    </div>
</header>

<main>
    <div class="welcome-card" id="welcome">
        <h3>👋 How can I help you shop today?</h3>
        <p>Ask me anything about products, prices, comparisons, or recommendations.</p>
        <div class="chips">
            <span class="chip" onclick="sendChip(this)">📱 Best smartphones?</span>
            <span class="chip" onclick="sendChip(this)">💻 Laptops under ₹90,000</span>
            <span class="chip" onclick="sendChip(this)">🎧 Which headphones?</span>
            <span class="chip" onclick="sendChip(this)">⚖️ Compare Samsung vs iPhone</span>
            <span class="chip" onclick="sendChip(this)">👗 Trendy dresses for women</span>
            <span class="chip" onclick="sendChip(this)">📺 Best 4K TV?</span>
        </div>
    </div>
    <div id="chat-box"></div>
</main>

<div class="input-bar">
    <div class="input-inner">
        <input id="user-input" type="text"
               placeholder="e.g. Which laptop should I buy under ₹90,000?"
               onkeydown="if(event.key==='Enter') sendMessage()" />
        <button id="send-btn" onclick="sendMessage()">Send 🚀</button>
    </div>
</div>

<script>
    const chatBox   = document.getElementById("chat-box");
    const input     = document.getElementById("user-input");
    const sendBtn   = document.getElementById("send-btn");
    const welcome   = document.getElementById("welcome");

    const CATEGORY_EMOJI = {
        "mobile": "📱", "smartphone": "📱",
        "laptop": "💻", "computer": "💻",
        "headphones": "🎧", "audio": "🎧",
        "television": "📺", "tv": "📺",
        "tablet": "📱", "camera": "📷",
        "women": "👗", "men": "👔",
        "home": "🏠", "appliance": "🏠",
    };

    function getCategoryEmoji(cat) {
        const lower = cat.toLowerCase();
        for (const [key, emoji] of Object.entries(CATEGORY_EMOJI)) {
            if (lower.includes(key)) return emoji;
        }
        return "🛍️";
    }

    function appendUser(text) {
        welcome.style.display = "none";
        chatBox.innerHTML += `
        <div class="user-row">
            <div class="user-bubble">${text}</div>
            <div class="user-avatar">🧑</div>
        </div>`;
        scrollBottom();
    }

    function appendTyping() {
        const id = "typing-" + Date.now();
        chatBox.innerHTML += `
        <div class="bot-row" id="${id}">
            <div class="bot-avatar">🤖</div>
            <div class="bot-bubble">
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>`;
        scrollBottom();
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function appendBot(text, sources) {
        let sourcesHtml = "";
        if (sources && sources.length > 0) {
            sourcesHtml += `<div class="sources-label">📦 Products Retrieved</div>
                            <div class="product-cards">`;
            sources.forEach(s => {
                const emoji = getCategoryEmoji(s.category);
                sourcesHtml += `
                <div class="product-card">
                    <div class="pc-emoji">${emoji}</div>
                    <div class="pc-name">${s.name}</div>
                    <div class="pc-cat">${s.category}</div>
                    <div class="pc-price">₹${s.price}</div>
                </div>`;
            });
            sourcesHtml += `</div>`;
        }

        chatBox.innerHTML += `
        <div class="bot-row">
            <div class="bot-avatar">🤖</div>
            <div class="bot-bubble">${text.replace(/\n/g, "<br>")}</div>
        </div>
        ${sourcesHtml}`;
        scrollBottom();
    }

    function scrollBottom() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function sendChip(el) {
        input.value = el.innerText.replace(/^[\p{Emoji}\s]+/u, "").trim();
        sendMessage();
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        sendBtn.disabled = true;
        appendUser(text);

        const typingId = appendTyping();

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            removeTyping(typingId);
            appendBot(data.answer, data.sources);
        } catch (err) {
            removeTyping(typingId);
            appendBot("⚠️ Something went wrong. Please try again.", []);
        }

        sendBtn.disabled = false;
        input.focus();
    }
</script>
</body>
</html>
